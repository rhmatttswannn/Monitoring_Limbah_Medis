<!-- Main Content -->
<main class="flex-1 px-4 py-6 overflow-y-auto pb-24">
<!-- Today Group -->
<section class="mb-8">
<div class="flex items-center gap-3 mb-4">
<h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Hari Ini</h2>
<div class="h-px flex-1 bg-slate-200 dark:bg-border-dark"></div>
</div>
    <div class="space-y-3" id="log-container">
      <!-- Logs will be injected here -->
      <div class="text-center py-10 opacity-50">
        <span class="material-symbols-outlined text-4xl mb-2">history</span>
        <p class="text-xs font-bold uppercase tracking-widest">Belum ada aktivitas tercatat</p>
      </div>
    </div>
  </section>
</main>

<script>
  function renderLogs() {
    const container = document.getElementById('log-container');
    const history = JSON.parse(localStorage.getItem('waste_history') || '[]');

    if (history.length === 0) return;

    container.innerHTML = ''; // Clear empty state

    history.forEach(log => {
      const ph = parseFloat(log.ph);
      const isWarning = ph < 6.5 || ph > 8.5 || log.jarak < 20;
      
      let icon = "check_circle";
      let iconColor = "text-primary";
      let bgColor = "bg-primary/10";
      let status = "Sistem Stabil";
      let title = "Kondisi Normal";

      if (isWarning) {
        icon = "warning";
        iconColor = "text-amber-500";
        bgColor = "bg-amber-500/10";
        status = "Perlu Ditinjau";
        title = log.jarak < 20 ? "Tangki Hampir Penuh" : "pH Tidak Normal";
      }

      const logHtml = `
        <div class="bg-white dark:bg-surface-dark p-4 rounded-xl border border-slate-100 dark:border-border-dark flex gap-4 shadow-sm transition-all hover:border-primary/30">
          <div class="size-10 rounded-full ${bgColor} flex items-center justify-center shrink-0">
            <span class="material-symbols-outlined ${iconColor}">${icon}</span>
          </div>
          <div class="flex-1">
            <div class="flex justify-between items-start">
              <h3 class="font-semibold text-slate-900 dark:text-slate-100">${title}</h3>
              <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500">${log.time}</span>
            </div>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
              pH: <span class="${ph < 6.5 || ph > 8.5 ? 'text-amber-500' : 'text-primary'} font-bold">${ph.toFixed(1)}</span> • 
              Suhu: <span class="font-bold">${parseFloat(log.suhu).toFixed(1)}°C</span> • 
              Jarak: <span class="${log.jarak < 20 ? 'text-amber-500' : 'text-primary'} font-bold">${parseFloat(log.jarak).toFixed(1)}cm</span>
            </p>
            <div class="mt-2 flex items-center gap-1">
              <span class="size-1.5 rounded-full ${isWarning ? 'bg-amber-500' : 'bg-primary'}"></span>
              <span class="text-[10px] uppercase font-bold ${isWarning ? 'text-amber-500' : 'text-primary'} tracking-tighter">${status}</span>
            </div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', logHtml);
    });
  }

  function exportToCSV() {
    const history = JSON.parse(localStorage.getItem('waste_history') || '[]');
    if (history.length === 0) {
      alert("Tidak ada data untuk diekspor");
      return;
    }

    let csvContent = "Waktu,pH,Suhu (C),Jarak (cm)\n";
    history.forEach(log => {
      csvContent += `${log.time},${log.ph},${log.suhu},${log.jarak}\n`;
    });

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", `log_limbah_medis_${new Date().toLocaleDateString('id-ID')}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }

  function logout() {
    const modal = document.getElementById('logout-modal');
    if (modal) {
      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }
  }

  function closeLogoutModal() {
    const modal = document.getElementById('logout-modal');
    if (modal) {
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }
  }

  function confirmLogout() {
    sessionStorage.removeItem('isLoggedIn');
    window.location.href = '../Login/login.html';
  }

  // Initial render
  renderLogs();

  // Update every 5 seconds if open
  setInterval(renderLogs, 5000);
</script>
